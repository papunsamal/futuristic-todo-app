<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Galaxy AI To-Do</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css"/>

  <!-- ICONS -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

</head>

<body>

  <!-- LOADER -->
  <div class="loader">
    <div class="ring"></div>
  </div>

  <!-- BACKGROUND -->
  <div class="bg"></div>

  <!-- APP -->
  <div class="app">

    <!-- HEADER -->
    <div class="header">

      <div>
        <h1>Galaxy Tasks</h1>
        <p>Future Productivity Dashboard 🚀</p>
      </div>

      <button id="themeToggle">
        <i class="fa-solid fa-moon"></i>
      </button>

    </div>

    <!-- STATS -->
    <div class="stats">

      <div class="card">
        <h3>Total</h3>
        <span id="totalTasks">0</span>
      </div>

      <div class="card">
        <h3>Completed</h3>
        <span id="completedTasks">0</span>
      </div>

      <div class="card">
        <h3>Pending</h3>
        <span id="pendingTasks">0</span>
      </div>

    </div>

    <!-- PROGRESS -->
    <div class="progress-box">

      <div class="progress-top">
        <h2>Progress</h2>
        <span id="progressText">0%</span>
      </div>

      <div class="progress-bar">
        <div class="progress"></div>
      </div>

    </div>

    <!-- INPUT -->
    <div class="input-box">

      <input
      type="text"
      id="taskInput"
      placeholder="Enter your mission...">

      <button id="addBtn">
        <i class="fa-solid fa-plus"></i>
      </button>

    </div>

    <!-- FILTERS -->
    <div class="filters">

      <button class="filter active" data-filter="all">
        All
      </button>

      <button class="filter" data-filter="completed">
        Completed
      </button>

      <button class="filter" data-filter="pending">
        Pending
      </button>

    </div>

    <!-- TASK LIST -->
    <ul id="taskList"></ul>

  </div>

  <!-- JS -->
  <script src="script.js"></script>

</body>
</html>
